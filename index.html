<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>originos 5</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --blur: blur(30px);
            --anim-speed: 0.65s;
            --ease: cubic-bezier(0.25, 1, 0.2, 1);
            --phone-radius: 44px; /* Slightly adjusted for smaller scale */
            --screen-radius: 38px;
            --bezel: 5px; 
        }

        /* REMOVE BLUE HIGHLIGHTS & SELECTION */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            outline: none;
        }

        body { margin: 0; height: 100vh; background: #0a0a0c; display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* SCALED DOWN PHONE FRAME */
        .phone { 
            width: 280px;  /* Reduced from 330px */
            height: 600px; /* Reduced from 700px */
            background: linear-gradient(145deg, #2c2c2e, #111111);
            border-radius: var(--phone-radius); 
            padding: var(--bezel); 
            position: relative; 
            box-shadow: 
                0 0 0 2px #3a3a3c,
                0 0 0 4px #1c1c1e,
                0 30px 60px rgba(0,0,0,0.8),
                inset 0 0 15px rgba(255,255,255,0.05);
        }

        .phone::after {
            content: "";
            position: absolute;
            top: var(--bezel); left: var(--bezel); right: var(--bezel); bottom: var(--bezel);
            border-radius: var(--screen-radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 40%, transparent 100%);
            pointer-events: none;
            z-index: 10002;
        }

        .screen { 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027); 
            border-radius: var(--screen-radius); 
            position: relative; 
            overflow: hidden; 
        }

        /* TOP ELEMENTS */
        .punch-hole { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #000; border-radius: 50%; z-index: 10000; pointer-events: none; box-shadow: inset 0 0 4px rgba(255,255,255,0.2); }
        .status-bar { position: absolute; top: 0; width: 100%; padding: 14px 22px 0; display: flex; justify-content: space-between; box-sizing: border-box; color: white; font-size: 10px; font-weight: 600; z-index: 10000; transition: color 0.3s; }
        .status-bar.dark { color: #000; }

        /* HOME VIEW */
        .home-view { padding: 60px 18px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
        .icon { width: 48px; height: 48px; border-radius: 13px; background: #8e8e93; box-shadow: 0 6px 12px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .app-item:active .icon { transform: scale(0.9); }
        .app-label { color: rgba(255,255,255,0.9); font-size: 10px; font-weight: 500; }

        /* APP WINDOW */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f4f9; z-index: 9000; opacity: 0; transform: scale(0.4);
            pointer-events: none; transition: transform var(--anim-speed) var(--ease), opacity 0.3s;
            border-radius: var(--screen-radius); overflow: hidden;
        }
        .app-window.active { opacity: 1; transform: scale(1) !important; pointer-events: all; }

        /* NAV PAGES */
        .page-container { display: flex; width: 200%; height: 100%; transition: transform 0.5s var(--ease); }
        .page-container.view-about { transform: translateX(-50%); }
        .page { width: 50%; height: 100%; padding: 60px 20px; box-sizing: border-box; position: relative; }

        /* SETTINGS LIST */
        .settings-list { list-style: none; padding: 0; margin-top: 10px; }
        .settings-item { 
            background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px;
            display: flex; justify-content: space-between; cursor: pointer; font-size: 13px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .about-pinned { background: #f4f4f4 !important; border: 1px solid #eee; } /* Removed Blue Highlight */

        /* ABOUT PHONE PAGE */
        .about-content { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        .origin-logo { width: 220px; height: auto; margin-bottom: 20px; pointer-events: none; }

        .back-btn { 
            position: absolute; top: 50px; left: 15px; font-size: 20px; cursor: pointer; 
            width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.04); z-index: 10;
        }

        /* HOME LINE */
        .home-indicator { position: absolute; bottom: 8px; left: 0; width: 100%; height: 20px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10001; }
        .line { width: 70px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 10px; transition: 0.3s; }
        .dark-line { background: rgba(0,0,0,0.12) !important; }

        /* DOCK */
        .dock { position: absolute; bottom: 30px; left: 15px; right: 15px; height: 70px; background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); border-radius: 26px; display: flex; justify-content: space-evenly; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="phone">
        <div class="screen">
            <div class="punch-hole"></div>
            <div class="status-bar" id="statusBar">
                <span>09:41</span>
                <span>5G 🔋</span>
            </div>

            <div class="home-view">
                <div class="app-item" onclick="openSettings(this)">
                    <div class="icon" style="background: radial-gradient(circle at top left, #555, #111); display:flex; align-items:center; justify-content:center; color:white; font-size:22px;">⚙️</div>
                    <span class="app-label">Settings</span>
                </div>
            </div>

            <div class="app-window" id="settingsApp">
                <div class="page-container" id="pageSlider">
                    <div class="page">
                        <h2 style="margin: 0 0 20px 10px; font-weight: 700; font-size: 20px;">Settings</h2>
                        <div class="settings-list">
                            <div class="settings-item about-pinned" onclick="goToAbout()">
                                <strong>About Phone</strong> <span>›</span>
                            </div>
                            <div class="settings-item"><span>Network & Internet</span> <span>›</span></div>
                            <div class="settings-item"><span>Display Brightness</span> <span>›</span></div>
                            <div class="settings-item"><span>System Updates</span> <span>›</span></div>
                        </div>
                    </div>

                    <div class="page">
                        <div class="back-btn" onclick="goBack()">‹</div>
                        <div class="about-content">
                            <img src="https://github.com/quandz24-ui/OriginWEB/blob/main/originData/OriginOS5Logo.webp?raw=true" class="origin-logo" alt="OriginOS 5" draggable="false">
                            <h2 style="margin:0; font-weight: 800; font-size: 20px;">OriginOS 5</h2>
                            <p style="color:#777; font-size:12px; margin-top:6px;">Vivo X200 Pro</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="home-indicator" onclick="closeSettings()">
                <div class="line" id="homeLine"></div>
            </div>

            <div class="dock">
                <div class="icon" style="width:44px; height:44px; background: linear-gradient(#58e278, #28a745);"></div>
                <div class="icon" style="width:44px; height:44px; background: linear-gradient(#5ac8fa, #007aff);"></div>
                <div class="icon" style="width:44px; height:44px; background: linear-gradient(#ffcc00, #ff9500);"></div>
            </div>
        </div>
    </div>

    <script>
        const app = document.getElementById('settingsApp');
        const statusBar = document.getElementById('statusBar');
        const homeLine = document.getElementById('homeLine');
        const slider = document.getElementById('pageSlider');

        function openSettings(element) {
            const rect = element.getBoundingClientRect();
            const screenRect = document.querySelector('.screen').getBoundingClientRect();
            app.style.transformOrigin = `${(rect.left + rect.width/2) - screenRect.left}px ${(rect.top + rect.height/2) - screenRect.top}px`;
            app.classList.add('active');
            statusBar.classList.add('dark');
            homeLine.classList.add('dark-line');
        }

        function closeSettings() {
            app.classList.remove('active');
            statusBar.classList.remove('dark');
            homeLine.classList.remove('dark-line');
            setTimeout(() => { slider.classList.remove('view-about'); }, 400);
        }

        function goToAbout() { slider.classList.add('view-about'); }
        function goBack() { slider.classList.remove('view-about'); }

        // DISABLE CONTEXT MENU AND DEV TOOLS
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(event.keyCode == 123) { return false; } // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        };
    </script>
</body>
</html>
