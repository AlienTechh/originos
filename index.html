<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>originos 5</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --blur: blur(30px);
            --anim-speed: 0.65s;
            --ease: cubic-bezier(0.25, 1, 0.2, 1);
            --phone-radius: 54px; /* Smoother, more modern curve */
            --screen-radius: 48px;
            --bezel: 6px; /* Ultra-slim flagship bezels */
        }

        body { margin: 0; height: 100vh; background: #0a0a0c; display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* NEW ELITE PHONE FRAME */
        .phone { 
            width: 330px; 
            height: 700px; 
            background: linear-gradient(145deg, #2c2c2e, #111111); /* Metallic titanium depth */
            border-radius: var(--phone-radius); 
            padding: var(--bezel); 
            position: relative; 
            /* Realistic hardware shadow and chrome rim */
            box-shadow: 
                0 0 0 2px #3a3a3c, /* Polished edge */
                0 0 0 4px #1c1c1e, /* Outer frame shadow */
                0 30px 60px rgba(0,0,0,0.8),
                inset 0 0 15px rgba(255,255,255,0.05);
        }

        /* Screen Reflection Layer */
        .phone::after {
            content: "";
            position: absolute;
            top: var(--bezel); left: var(--bezel); right: var(--bezel); bottom: var(--bezel);
            border-radius: var(--screen-radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 40%, transparent 100%);
            pointer-events: none;
            z-index: 10002;
        }

        .screen { 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027); 
            border-radius: var(--screen-radius); 
            position: relative; 
            overflow: hidden; 
        }

        /* TOP ELEMENTS */
        .punch-hole { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; background: #000; border-radius: 50%; z-index: 10000; pointer-events: none; box-shadow: inset 0 0 4px rgba(255,255,255,0.2); }
        .status-bar { position: absolute; top: 0; width: 100%; padding: 18px 30px 0; display: flex; justify-content: space-between; box-sizing: border-box; color: white; font-size: 11px; font-weight: 600; z-index: 10000; transition: color 0.3s; }
        .status-bar.dark { color: #000; }

        /* HOME VIEW */
        .home-view { padding: 80px 22px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon { width: 56px; height: 56px; border-radius: 16px; background: #8e8e93; box-shadow: 0 8px 16px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .app-item:active .icon { transform: scale(0.9); }
        .app-label { color: rgba(255,255,255,0.9); font-size: 11px; font-weight: 500; }

        /* APP WINDOW */
        .app-window {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f4f9; z-index: 9000; opacity: 0; transform: scale(0.4);
            pointer-events: none; transition: transform var(--anim-speed) var(--ease), opacity 0.3s;
            border-radius: var(--screen-radius); overflow: hidden;
        }
        .app-window.active { opacity: 1; transform: scale(1) !important; pointer-events: all; }

        /* NAV PAGES */
        .page-container { display: flex; width: 200%; height: 100%; transition: transform 0.5s var(--ease); }
        .page-container.view-about { transform: translateX(-50%); }
        .page { width: 50%; height: 100%; padding: 70px 25px; box-sizing: border-box; position: relative; }

        /* SETTINGS LIST */
        .settings-list { list-style: none; padding: 0; margin-top: 15px; }
        .settings-item { 
            background: white; padding: 18px; border-radius: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; cursor: pointer; font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .about-pinned { background: linear-gradient(to right, #eef2ff, #f5f7ff) !important; border: 1px solid #dce4ff; }

        /* ABOUT PHONE PAGE */
        .about-content { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .origin-logo { width: 280px; height: auto; margin-bottom: 25px; }

        .back-btn { 
            position: absolute; top: 60px; left: 20px; font-size: 24px; cursor: pointer; 
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.04); z-index: 10;
        }

        /* HOME LINE */
        .home-indicator { position: absolute; bottom: 8px; left: 0; width: 100%; height: 24px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10001; }
        .line { width: 85px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 10px; transition: 0.3s; }
        .dark-line { background: rgba(0,0,0,0.12) !important; }

        /* DOCK */
        .dock { position: absolute; bottom: 35px; left: 18px; right: 18px; height: 80px; background: rgba(255,255,255,0.1); backdrop-filter: blur(25px); border-radius: 30px; display: flex; justify-content: space-evenly; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="phone">
        <div class="screen">
            <div class="punch-hole"></div>
            <div class="status-bar" id="statusBar">
                <span>09:41</span>
                <span>5G 🔋</span>
            </div>

            <div class="home-view">
                <div class="app-item" onclick="openSettings(this)">
                    <div class="icon" style="background: radial-gradient(circle at top left, #555, #111); display:flex; align-items:center; justify-content:center; color:white; font-size:26px;">⚙️</div>
                    <span class="app-label">Settings</span>
                </div>
            </div>

            <div class="app-window" id="settingsApp">
                <div class="page-container" id="pageSlider">
                    <div class="page">
                        <h2 style="margin: 0 0 25px 10px; font-weight: 700; font-size: 24px;">Settings</h2>
                        <div class="settings-list">
                            <div class="settings-item about-pinned" onclick="goToAbout()">
                                <strong>About Phone</strong> <span>›</span>
                            </div>
                            <div class="settings-item"><span>Network & Internet</span> <span>›</span></div>
                            <div class="settings-item"><span>Display Brightness</span> <span>›</span></div>
                            <div class="settings-item"><span>System Updates</span> <span>›</span></div>
                        </div>
                    </div>

                    <div class="page">
                        <div class="back-btn" onclick="goBack()">‹</div>
                        <div class="about-content">
                            <img src="https://github.com/quandz24-ui/OriginWEB/blob/main/originData/OriginOS5Logo.webp?raw=true" class="origin-logo" alt="OriginOS 5">
                            <h2 style="margin:0; font-weight: 800; font-size: 22px;">OriginOS 5</h2>
                            <p style="color:#777; font-size:14px; margin-top:6px;">Vivo X200 Pro</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="home-indicator" onclick="closeSettings()">
                <div class="line" id="homeLine"></div>
            </div>

            <div class="dock">
                <div class="icon" style="width:50px; height:50px; background: linear-gradient(#58e278, #28a745);"></div>
                <div class="icon" style="width:50px; height:50px; background: linear-gradient(#5ac8fa, #007aff);"></div>
                <div class="icon" style="width:50px; height:50px; background: linear-gradient(#ffcc00, #ff9500);"></div>
            </div>
        </div>
    </div>

    <script>
        const app = document.getElementById('settingsApp');
        const statusBar = document.getElementById('statusBar');
        const homeLine = document.getElementById('homeLine');
        const slider = document.getElementById('pageSlider');

        function openSettings(element) {
            const rect = element.getBoundingClientRect();
            const screenRect = document.querySelector('.screen').getBoundingClientRect();
            app.style.transformOrigin = `${(rect.left + rect.width/2) - screenRect.left}px ${(rect.top + rect.height/2) - screenRect.top}px`;
            
            app.classList.add('active');
            statusBar.classList.add('dark');
            homeLine.classList.add('dark-line');
        }

        function closeSettings() {
            app.classList.remove('active');
            statusBar.classList.remove('dark');
            homeLine.classList.remove('dark-line');
            setTimeout(() => { slider.classList.remove('view-about'); }, 400);
        }

        function goToAbout() { slider.classList.add('view-about'); }
        function goBack() { slider.classList.remove('view-about'); }
    </script>
</body>
</html>
