<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pure JS Site</title>
</head>
<body>

    <div id="root"></div>

    <script>
        
        // (function() {
    // 1. ADVANCED STYLES - Ditching the phone frame for a "Floating OS" vibe
    const css = `
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #4facfe;
            --ease: cubic-bezier(0.2, 1, 0.2, 1);
        }

        body { 
            margin: 0; 
            height: 100vh; 
            background: radial-gradient(circle at top right, #1e3c72, #2a5298, #000); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            color: white;
        }

        /* BACKGROUND DECORATION */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* THE MAIN APP DECK */
        .app-deck {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* FLOATING SETTINGS CARD */
        .settings-card {
            width: 400px;
            height: 550px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            transition: all 0.8s var(--ease);
            overflow: hidden;
        }

        .settings-card.expanded {
            width: 450px;
            height: 600px;
        }

        /* INTERNAL NAVIGATION */
        .nav-view {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.6s var(--ease);
        }

        .view-about { transform: translateX(-50%); }

        .pane {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* LIST DESIGN */
        .menu-item {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--glass-border);
            transform: translateX(5px);
        }

        /* ABOUT PANE */
        .about-pane {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .origin-logo {
            width: 320px; /* Max size */
            height: auto;
            filter: drop-shadow(0 0 20px rgba(79, 172, 254, 0.3));
        }

        .back-btn {
            align-self: flex-start;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* ICON BUTTON */
        .open-btn {
            padding: 20px 40px;
            background: white;
            color: black;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .open-btn:hover { transform: scale(1.05); }

        .hidden { display: none !important; }
    `;

    const styleSheet = document.createElement("style");
    styleSheet.innerText = css;
    document.head.appendChild(styleSheet);

    // 2. DOM STRUCTURE
    const markup = `
        <div class="bg-glow"></div>
        
        <div class="app-deck">
            <button class="open-btn" id="launch">Open System Settings</button>

            <div class="settings-card hidden" id="card">
                <div class="nav-view" id="nav">
                    
                    <div class="pane">
                        <h1 style="font-weight:200; margin-bottom:40px;">Settings</h1>
                        <div class="menu-item" id="go-about">
                            <div>
                                <span style="display:block; font-size:16px; font-weight:600;">About System</span>
                                <span style="font-size:12px; opacity:0.5;">OriginOS 5.0 Global</span>
                            </div>
                            <span>→</span>
                        </div>
                        <div class="menu-item"><span>Connectivity</span> <span>→</span></div>
                        <div class="menu-item"><span>Personalization</span> <span>→</span></div>
                        <div class="menu-item"><span>Privacy & Security</span> <span>→</span></div>
                    </div>

                    <div class="pane about-pane">
                        <div class="back-btn" id="back">← Back</div>
                        <img src="https://github.com/quandz24-ui/OriginWEB/blob/main/originData/OriginOS5Logo.webp?raw=true" class="origin-logo" alt="Origin Logo">
                        <h2 style="font-weight:600; margin-top:0;">OriginOS 5</h2>
                        <p style="opacity:0.6; font-size:14px; letter-spacing:1px;">X200 PRO | ANDROID 15</p>
                    </div>

                </div>
            </div>
        </div>
    `;

    document.body.innerHTML = markup;

    // 3. INTERACTION LOGIC
    const launch = document.getElementById('launch');
    const card = document.getElementById('card');
    const nav = document.getElementById('nav');
    const goAbout = document.getElementById('go-about');
    const back = document.getElementById('back');

    launch.addEventListener('click', () => {
        launch.classList.add('hidden');
        card.classList.remove('hidden');
        // Small trigger for entrance animation
        card.style.opacity = "0";
        card.style.transform = "translateY(50px) scale(0.9)";
        setTimeout(() => {
            card.style.transition = "all 0.8s var(--ease)";
            card.style.opacity = "1";
            card.style.transform = "translateY(0) scale(1)";
        }, 10);
    });

    goAbout.addEventListener('click', () => {
        nav.classList.add('view-about');
        card.classList.add('expanded');
    });

    back.addEventListener('click', () => {
        nav.classList.remove('view-about');
        card.classList.remove('expanded');
    });

})();

    </script>

</body>
</html>
