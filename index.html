<!DOCTYPE html>
<html>
<head>
    <title>My Pure JS Site</title>
</head>
<body>

    <!-- 1. Ensure this ID exists! -->
    <div id="root">Loading...</div>

    <script>
        // 2. Wrap your code in a try/catch to see errors on the screen
        try {
            const root = document.getElementById('root');
            
            // Example of your code logic
            const heading = document.createElement('h1');
            heading.innerText = "It's working!";
            
            // Clear "Loading..." and add new content
            root.innerHTML = ""; 
            root.appendChild(heading);

        } catch (err) {
            // This will show you the error directly on the webpage
            document.body.innerHTML = "<h1>JS Error:</h1><p>" + err + "</p>";
        }
    </script>

</body>
</html>
